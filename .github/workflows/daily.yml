name: Daily Report
on:
  schedule:
    - cron: '0 6 * * *'   # 08:00 за Києвом (Повний звіт)
    - cron: '0 13 * * *'  # 15:00 за Києвом (Погода + Валюта)
  workflow_dispatch:      # Кнопка для ручного запуску

jobs:
  send_report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run
        env:
          TOKEN: ${{ secrets.TOKEN }}
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
          MY_CHAT_ID: ${{ secrets.MY_CHAT_ID }}
        run: python main.py
