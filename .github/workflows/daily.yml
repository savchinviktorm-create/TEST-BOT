name: Daily Report
on:
  schedule:
    - cron: '30 5 * * *'
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - sudo apt-get update
      - pip install requests
      - env:
          TOKEN: ${{ secrets.TOKEN }}
          MY_CHAT_ID: ${{ secrets.MY_CHAT_ID }}
        run: python main.py
